<svg width="800" height="620" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Pure Black Background */
    .bg { fill: #0A0A0A; }
    
    /* Text Styles */
    .text { font-family: Consolas, 'Courier New', monospace; font-size: 15px; fill: #CCCCCC; }
    .prompt { fill: #E06C75; }
    .cyan { fill: #56B6C2; }
    .green { fill: #98C379; }
    .orange { fill: #D19A66; }
    .blue { fill: #61AFEF; }
    
    /* Blinking Cursor (Uses visibility so it doesn't fight the opacity animation) */
    .blink { animation: blinker 1s step-end infinite; }
    @keyframes blinker { 50% { visibility: hidden; } }

    /* Line-by-line typing animations generated by Python */
    .l1 { opacity: 0; animation: anim_l1 16s infinite; }
@keyframes anim_l1 { 0%, 3% { opacity: 0; } 3.1%, 95% { opacity: 1; } 95.1%, 100% { opacity: 0; } }
.l2 { opacity: 0; animation: anim_l2 16s infinite; }
@keyframes anim_l2 { 0%, 10% { opacity: 0; } 10.1%, 95% { opacity: 1; } 95.1%, 100% { opacity: 0; } }
.l3 { opacity: 0; animation: anim_l3 16s infinite; }
@keyframes anim_l3 { 0%, 18% { opacity: 0; } 18.1%, 95% { opacity: 1; } 95.1%, 100% { opacity: 0; } }
.l4 { opacity: 0; animation: anim_l4 16s infinite; }
@keyframes anim_l4 { 0%, 25% { opacity: 0; } 25.1%, 95% { opacity: 1; } 95.1%, 100% { opacity: 0; } }
.l5 { opacity: 0; animation: anim_l5 16s infinite; }
@keyframes anim_l5 { 0%, 40% { opacity: 0; } 40.1%, 95% { opacity: 1; } 95.1%, 100% { opacity: 0; } }
.l6 { opacity: 0; animation: anim_l6 16s infinite; }
@keyframes anim_l6 { 0%, 47% { opacity: 0; } 47.1%, 95% { opacity: 1; } 95.1%, 100% { opacity: 0; } }
.l7 { opacity: 0; animation: anim_l7 16s infinite; }
@keyframes anim_l7 { 0%, 62% { opacity: 0; } 62.1%, 95% { opacity: 1; } 95.1%, 100% { opacity: 0; } }
.l8 { opacity: 0; animation: anim_l8 16s infinite; }
@keyframes anim_l8 { 0%, 69% { opacity: 0; } 69.1%, 95% { opacity: 1; } 95.1%, 100% { opacity: 0; } }
.l9 { opacity: 0; animation: anim_l9 16s infinite; }
@keyframes anim_l9 { 0%, 76% { opacity: 0; } 76.1%, 95% { opacity: 1; } 95.1%, 100% { opacity: 0; } }

  </style>

  <!-- Clean Black Terminal Background -->
  <rect width="100%" height="100%" class="bg"/>

  <!-- Terminal Content -->
  <g transform="translate(20, 30)">
    
    <!-- Boot Sequence -->
    <text x="0" y="0" class="text l1">Initializing terminal...</text>
    <text x="0" y="20" class="text l2"><tspan class="green">[OK]</tspan> System ready</text>

    <!-- Command 1: GitHub Stats -->
    <text x="0" y="60" class="text l3"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; github-stats --user hlcbabuyo</text>
    
    <g class="l4">
        <text x="0" y="100" class="text cyan">=== GitHub Stats for hlcbabuyo ===</text>
        <text x="0" y="120" class="text"><tspan class="orange">Name:</tspan>        Harvie Lorenz C. Babuyo</text>
        <text x="0" y="140" class="text"><tspan class="orange">Role:</tspan>        Backend Systems Engineer</text>
        <text x="0" y="160" class="text"><tspan class="orange">Location:</tspan>    Tagoloan, Philippines</text>
        <text x="0" y="180" class="text"><tspan class="orange">Goal:</tspan>        240-Hour OJT (June 2026)</text>
        <text x="0" y="200" class="text"><tspan class="orange">Repos:</tspan>       5</text>
        <text x="0" y="220" class="text"><tspan class="orange">Followers:</tspan>   11</text>
        <text x="0" y="240" class="text cyan">==================================</text>
    </g>

    <!-- Command 2: Tech Stack -->
    <text x="0" y="280" class="text l5"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; cat skills.txt</text>
    
    <g class="l6">
        <text x="0" y="320" class="text cyan">=== Tech Stack ===</text>
        <text x="0" y="340" class="text"><tspan class="blue">Backend:</tspan>     Python, FastAPI, SQLAlchemy, Pydantic</text>
        <text x="0" y="360" class="text"><tspan class="blue">Database:</tspan>    PostgreSQL, PostGIS, Redis</text>
        <text x="0" y="380" class="text"><tspan class="blue">Cloud:</tspan>       AWS (S3, EC2, RDS, IAM)</text>
        <text x="0" y="400" class="text"><tspan class="blue">DevOps:</tspan>      Docker, Git, GitHub Actions</text>
        <text x="0" y="420" class="text"><tspan class="blue">Processing:</tspan>  Celery, BeautifulSoup</text>
        <text x="0" y="440" class="text"><tspan class="blue">Tools:</tspan>       ReportLab, QRCode, boto3, Postman</text>
        <text x="0" y="460" class="text"><tspan class="blue">Languages:</tspan>   Python, SQL</text>
        <text x="0" y="480" class="text cyan">==================</text>
    </g>

    <!-- Command 3: The Outro -->
    <text x="0" y="520" class="text l7"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; echo 'Thanks for visiting my profile!'</text>
    <text x="0" y="540" class="text green l8">Thanks for visiting my profile!</text>

    <!-- Final Prompt with Blinking Cursor -->
    <text x="0" y="580" class="text l9"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; <tspan class="blink">█</tspan></text>
  </g>
</svg>