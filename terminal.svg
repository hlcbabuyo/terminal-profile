<svg width="100%" height="620" viewBox="0 0 1200 620" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0A0A0A; }
    .text { font-family: Consolas, 'Courier New', monospace; font-size: 15px; fill: #CCCCCC; }
    .prompt { fill: #E06C75; }
    .cyan { fill: #56B6C2; }
    .green { fill: #98C379; }
    .orange { fill: #D19A66; }
    .blue { fill: #61AFEF; }
  </style>

  <!-- Clean Black Terminal Background -->
  <rect width="100%" height="100%" class="bg"/>

  <!-- Terminal Content -->
  <g transform="translate(20, 30)">
    
    <!-- Boot Sequence -->
    <text x="0" y="0" class="text" opacity="0">Initializing terminal...<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.021;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="20" class="text" opacity="0"><tspan class="green">[OK]</tspan> System ready<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.06;0.061;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>

    <!-- Command 1: GitHub Stats -->
    <text x="0" y="60" class="text" opacity="0"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; github-stats --user hlcbabuyo<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.12;0.121;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    
    <text x="0" y="100" class="text cyan" opacity="0">=== GitHub Stats for hlcbabuyo ===<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.16;0.161;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="120" class="text" opacity="0"><tspan class="orange">Name:</tspan>        Harvie Lorenz C. Babuyo<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.19;0.191;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="140" class="text" opacity="0"><tspan class="orange">Role:</tspan>        Backend Systems Engineer<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.22;0.221;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="160" class="text" opacity="0"><tspan class="orange">Location:</tspan>    Tagoloan, Misamis Oriental, Philippines<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.251;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="180" class="text" opacity="0"><tspan class="orange">Goal:</tspan>        240-Hour OJT (June 2026)<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.28;0.281;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="200" class="text" opacity="0"><tspan class="orange">Repos:</tspan>       5<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.31;0.311;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="220" class="text" opacity="0"><tspan class="orange">Followers:</tspan>   11<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.34;0.341;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="240" class="text cyan" opacity="0">==================================<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.37;0.371;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>

    <!-- Command 2: Tech Stack -->
    <text x="0" y="280" class="text" opacity="0"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; cat skills.txt<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.43;0.431;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    
    <text x="0" y="320" class="text cyan" opacity="0">=== Tech Stack ===<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.47;0.471;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="340" class="text" opacity="0"><tspan class="blue">Backend:</tspan>     Python, FastAPI, SQLAlchemy, Pydantic<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.501;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="360" class="text" opacity="0"><tspan class="blue">Database:</tspan>    PostgreSQL, PostGIS, Redis<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.53;0.531;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="380" class="text" opacity="0"><tspan class="blue">Cloud:</tspan>       AWS (S3, EC2, RDS, IAM)<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.56;0.561;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="400" class="text" opacity="0"><tspan class="blue">DevOps:</tspan>      Docker, Git, GitHub Actions<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.59;0.591;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="420" class="text" opacity="0"><tspan class="blue">Processing:</tspan>  Celery, BeautifulSoup<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.62;0.621;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="440" class="text" opacity="0"><tspan class="blue">Tools:</tspan>       ReportLab, QRCode, boto3, Postman<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.65;0.651;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="460" class="text" opacity="0"><tspan class="blue">Languages:</tspan>   Python, SQL<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.68;0.681;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="480" class="text cyan" opacity="0">==================<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.71;0.711;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>

    <!-- Command 3: The Outro -->
    <text x="0" y="520" class="text" opacity="0"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; echo 'Thanks for visiting my profile!'<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.77;0.771;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="540" class="text green" opacity="0">Thanks for visiting my profile!<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.81;0.811;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>

    <!-- Final Prompt with Blinking Cursor -->
    <text x="0" y="580" class="text" opacity="0"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; <tspan fill="#CCCCCC"><animate attributeName="opacity" values="1;0" keyTimes="0;0.5" dur="1s" repeatCount="indefinite" />█</tspan><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.87;0.871;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    
  </g>
</svg>