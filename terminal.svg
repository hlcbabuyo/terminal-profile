<svg width="800" height="620" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0A0A0A; }
    .text { font-family: Consolas, 'Courier New', monospace; font-size: 15px; fill: #CCCCCC; }
    .prompt { fill: #E06C75; }
    .cyan { fill: #56B6C2; }
    .green { fill: #98C379; }
    .orange { fill: #D19A66; }
    .blue { fill: #61AFEF; }
    .blink { animation: blinker 1s step-end infinite; }
    @keyframes blinker { 50% { opacity: 0; } }
  </style>

  <rect width="100%" height="100%" class="bg"/>

  <g transform="translate(20, 30)">
    
    <!-- Boot Sequence -->
    <text x="0" y="0" class="text" opacity="0">Initializing terminal...<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.29;0.291;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="20" class="text" opacity="0"><tspan class="green">[OK]</tspan> System ready<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.331;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>

    <!-- Command 1: GitHub Stats -->
    <text x="0" y="60" class="text" opacity="0"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; github-stats --user hlcbabuyo<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.021;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
<rect x="185" y="45" width="450" height="20" class="bg" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.021;0.95;0.951;1" dur="20s" repeatCount="indefinite" /><animate attributeName="x" values="185;185;428.6;428.6;185;185" keyTimes="0;0.02;0.08;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></rect>
<text x="185" y="60" class="text" opacity="0">█<animate attributeName="x" values="185;185;428.6;428.6;185;185" keyTimes="0;0.02;0.08;0.95;0.951;1" dur="20s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.021;0.08;0.081;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="100" class="text cyan" opacity="0">=== GitHub Stats for hlcbabuyo ===<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.39;0.391;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="120" class="text" opacity="0"><tspan class="orange">Name:</tspan>        Harvie Lorenz C. Babuyo<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.41;0.411;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="140" class="text" opacity="0"><tspan class="orange">Role:</tspan>        Backend Systems Engineer<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.43;0.431;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="160" class="text" opacity="0"><tspan class="orange">Location:</tspan>    Tagoloan, Misamis Oriental, Philippines<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.45;0.451;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="180" class="text" opacity="0"><tspan class="orange">Goal:</tspan>        240-Hour OJT (June 2026)<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.47;0.471;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="200" class="text" opacity="0"><tspan class="orange">Repos:</tspan>       5<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.49;0.491;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="220" class="text" opacity="0"><tspan class="orange">Followers:</tspan>   11<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.51;0.511;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="240" class="text cyan" opacity="0">==================================<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.53;0.531;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>

    <!-- Command 2: Tech Stack -->
    <text x="0" y="280" class="text" opacity="0"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; cat skills.txt<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.11;0.111;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
<rect x="185" y="265" width="450" height="20" class="bg" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.11;0.111;0.95;0.951;1" dur="20s" repeatCount="indefinite" /><animate attributeName="x" values="185;185;302.6;302.6;185;185" keyTimes="0;0.11;0.17;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></rect>
<text x="185" y="280" class="text" opacity="0">█<animate attributeName="x" values="185;185;302.6;302.6;185;185" keyTimes="0;0.11;0.17;0.95;0.951;1" dur="20s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.11;0.111;0.17;0.171;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="320" class="text cyan" opacity="0">=== Tech Stack ===<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.59;0.591;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="340" class="text" opacity="0"><tspan class="blue">Backend:</tspan>     Python, FastAPI, SQLAlchemy, Pydantic<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.61;0.611;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="360" class="text" opacity="0"><tspan class="blue">Database:</tspan>    PostgreSQL, PostGIS, Redis<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.63;0.631;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="380" class="text" opacity="0"><tspan class="blue">Cloud:</tspan>       AWS (S3, EC2, RDS, IAM)<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.65;0.651;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="400" class="text" opacity="0"><tspan class="blue">DevOps:</tspan>      Docker, Git, GitHub Actions<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.67;0.671;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="420" class="text" opacity="0"><tspan class="blue">Processing:</tspan>  Celery, BeautifulSoup<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.69;0.691;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="440" class="text" opacity="0"><tspan class="blue">Tools:</tspan>       ReportLab, QRCode, boto3, Postman<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.71;0.711;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="460" class="text" opacity="0"><tspan class="blue">Languages:</tspan>   Python, SQL<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.73;0.731;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="480" class="text cyan" opacity="0">==================<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.75;0.751;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>

    <!-- Command 3: The Outro -->
    <text x="0" y="520" class="text" opacity="0"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; echo 'Thanks for visiting my profile!'<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.201;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>
<rect x="185" y="505" width="450" height="20" class="bg" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.201;0.95;0.951;1" dur="20s" repeatCount="indefinite" /><animate attributeName="x" values="185;185;504.2;504.2;185;185" keyTimes="0;0.2;0.26;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></rect>
<text x="185" y="520" class="text" opacity="0">█<animate attributeName="x" values="185;185;504.2;504.2;185;185" keyTimes="0;0.2;0.26;0.95;0.951;1" dur="20s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.201;0.26;0.261;1" dur="20s" repeatCount="indefinite" /></text>
    <text x="0" y="540" class="text green" opacity="0">Thanks for visiting my profile!<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.81;0.811;0.95;0.951;1" dur="20s" repeatCount="indefinite" /></text>

    <!-- Final Prompt with Blinking Cursor -->
    <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.8700000000000003;0.8710000000000003;0.95;0.951;1" dur="20s" repeatCount="indefinite" />
        <text x="0" y="580" class="text"><tspan class="prompt">hlcbabuyo@github</tspan> ~&gt; <tspan class="blink">█</tspan></text>
    </g>
    
  </g>
</svg>