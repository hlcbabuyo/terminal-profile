name: Generate Terminal Profile

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate SVG
        run: python stats.py

      - name: Commit and Push SVG
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add terminal.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update terminal SVG [skip ci]"
          git push
