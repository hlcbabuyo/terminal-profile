name: Generate Terminal Profile

on:
  schedule:
    - cron: '0 0 * * *' # Auto-runs at midnight
  workflow_dispatch: # Allows manual run

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Bypassing VHS Action)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd fonts-firacode
          
      - name: Install VHS directly via Go
        run: go install github.com/charmbracelet/vhs@latest

      - name: Generate Terminal GIF
        run: ~/go/bin/vhs profile.tape

      - name: Commit and Push GIF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add terminal.gif
          git diff --quiet && git diff --staged --quiet || git commit -m "Update terminal animation [skip ci]"
          git push
