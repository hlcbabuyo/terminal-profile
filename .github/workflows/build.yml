name: Generate Terminal Profile

on:
  schedule:
    - cron: '0 0 * * *' # Auto-runs at midnight
  workflow_dispatch: # Allows manual run

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install git+https://github.com/hlcbabuyo/gifos.git
          pip install requests python-dotenv

      - name: Generate Terminal GIF
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python stats.py

      - name: Commit and Push GIF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add output.gif
          # Only commit if the GIF has actually changed
          git diff --quiet && git diff --staged --quiet || git commit -m "Update terminal GIF [skip ci]"
          git pull --rebase origin main
          git push
